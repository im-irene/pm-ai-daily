<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM × AI Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container header-content">
      <span class="site-title">PM × AI Daily</span>
      <span class="updated-at" id="updated-at">--</span>
    </div>
  </header>

  <nav class="filter-nav">
    <!-- 分類 -->
    <div class="filter-group">
      <span class="filter-label">分類</span>
      <div class="filter-tabs" id="cat-tabs">
        <button class="tab active" data-cat="all">全部 <span class="count">0</span></button>
        <button class="tab" data-cat="pm">PM <span class="count">0</span></button>
        <button class="tab" data-cat="ai">AI <span class="count">0</span></button>
      </div>
    </div>
    <!-- 類型 -->
    <div class="filter-group">
      <span class="filter-label">類型</span>
      <div class="filter-tabs" id="type-tabs">
        <button class="tab active" data-type="all">全部 <span class="count">0</span></button>
        <button class="tab" data-type="產業新聞">產業新聞 <span class="count">0</span></button>
        <button class="tab" data-type="社群討論">社群討論 <span class="count">0</span></button>
        <button class="tab" data-type="技術新聞">技術新聞 <span class="count">0</span></button>
        <button class="tab" data-type="產品發布">產品發布 <span class="count">0</span></button>
        <button class="tab" data-type="作品展示">作品展示 <span class="count">0</span></button>
      </div>
    </div>
    <!-- 時間 -->
    <div class="filter-group">
      <span class="filter-label">時間</span>
      <div class="filter-tabs" id="date-tabs">
        <button class="tab active" data-date="all">全部 <span class="count">0</span></button>
        <button class="tab" data-date="today">今日 <span class="count">0</span></button>
        <button class="tab" data-date="yesterday">昨日 <span class="count">0</span></button>
        <button class="tab" data-date="earlier">更早 <span class="count">0</span></button>
      </div>
      <div class="date-range-wrap">
        <input type="date" id="date-from" class="date-input" title="起始日期">
        <span class="date-sep">–</span>
        <input type="date" id="date-to" class="date-input" title="結束日期">
        <button class="date-clear" id="date-clear" title="清除">&#x2715;</button>
      </div>
    </div>
  </nav>

  <div class="layout">

    <!-- 左側：文章清單 -->
    <div class="list-panel" id="list-panel">
      <div class="loading" id="loading">載入中...</div>
      <div id="news-list" class="hidden"></div>
      <div id="empty-state" class="empty-state hidden">
        <p class="empty-title">尚無資料</p>
        <p class="empty-desc">每日 09:00（台灣時間）自動更新<br>或前往 GitHub Actions 手動觸發</p>
      </div>
    </div>

    <!-- 右側：文章詳情 -->
    <div class="detail-panel" id="detail-panel">
      <div id="detail-placeholder" class="detail-placeholder">
        <div class="placeholder-arrow">&#8592;</div>
        <p>點選左側文章</p>
        <p class="placeholder-hint">查看 Claude 閱讀總結</p>
      </div>
      <div id="detail-content" class="hidden"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
